[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "api"
  included_files = ["plugins/**"]

# كل طلبات /api/* تذهب لدالة واحدة (dispatcher) لتجاوز حد Vercel/Netlify
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/[...slug]"
  status = 200

# SPA fallback لـ React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
